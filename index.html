<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Libraries -->
    <!-- Model-Viewer -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"
    ></script>

    <script defer src="src/javascript/modelviewer.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <title>SRON</title>
  </head>
  <body>
<div class="loader">

<p>Loading...</p>

<progress value="0" max="100"></progress>

</div>

    <div class="meteor-layer" aria-hidden="true">
      <span class="meteor meteor-one"></span>
      <span class="meteor meteor-two"></span>
    </div>

    <section>
    <h1>SRON</h1>
    <p>Bringing science to space</p>
    </section>

    <model-viewer
      id="satellite-viewer"
      alt="3d model of a satellite"
      src="src/models/jeancarlos_model.glb"
      camera-orbit="0deg 75deg 3.2m"
      orientation="0deg -90deg 180deg"
    ></model-viewer>

  </body>
</html>

<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Libraries -->
    <!-- 3D Model Weergave -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"
    ></script>
    <script defer src="src/js/modelviewer.js"></script>

    <!-- GSAP + ScrollTrigger Animatie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script defer src="src/js/animations.js"></script>

    <!-- Stijlen -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Lettertypes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <title>SRON</title>
  </head>

  <!-- LOADER + ANIMATED SATELITE -->
    <div class="loader">
      <div class="loader-content">
        <div class="loader-header">
          <p>SYS. MODE: SUN ACQUISITION</p>
          <p>KSAT GROUND STATION: CONNECTED</p>
        </div>
        <div class="loader-center">
          <h2 id="progress-text" class="progress-large">0%</h2>
        </div>
        <div class="loader-footer">
          <div class="loader-logs">
            <p>> BOOTING SIRIUS OBC & TCM...</p>
            <p>> ALIGNING ST-16HV STAR TRACKERS...</p>
            <p class="highlight">> COOLING FASTSDD DETECTORS TO -35°C...</p>
          </div>
          <div class="loader-status">
            <p>
              AWAITING X-RAY PHOTON DETECTION...<span class="cursor"></span>
            </p>
          </div>
        </div>
      </div>
      <progress value="0" max="100" style="display: none"></progress>
    </div>

<!-- Audio: background music --> 
<!-- <figure>
  <audio id="bgMusic" autoplay loop muted src="/src/audio/space-music.mp3" type="audio/mpeg"></audio>
</figure> -->

<figure>
    <!-- <audio id="bgMusic" autoplay controls loop title='Space background music'>
      <source src='/src/audio/idoberg-space-chords-loop-310493.mp3' type='audio/mp3'>
    </audio> -->
    <audio id="bgMusic" loop src="/src/audio/space-music.mp3"></audio>
    <button id="muteBtn" class="muted" width></button>
</figure>
    
<!-- STARS IN BACKGROUND -->
    <div class="meteor-layer" aria-hidden="true">
      <span class="meteor meteor-one"></span>
      <span class="meteor meteor-two"></span>
    </div>

<!-- TITLE -->
    <section>
      <h1>NEBULA EXPLORER</h1>
      <canvas id="main-canvas"></canvas>
      <!-- <p id="hero-text">Bringing science to space</p> -->
    </section>

<!-- SPACE DOG -->
    <img
class="laika"
src="src/images/laika.png" alt="laika de hond">
  </img>

  <script src="/src/javascript/logo-animation.js"></script>
    <model-viewer
      id="satellite-viewer"
      alt="3d model of a satellite"
      src="src/models/jeancarlos_model.glb"
      camera-orbit="0deg 75deg 3.2m"
      orientation="0deg -90deg 180deg"
    ></model-viewer>

  </body>
</html>
